# BizScout API — add this block to your Nginx config on the VPS
# File: /etc/nginx/sites-available/bizscout
# Then: sudo ln -s /etc/nginx/sites-available/bizscout /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d api.bizscout.it.com
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.bizscout.it.com;

    # Certbot will add SSL block here automatically
    location / {
        proxy_pass         http://localhost:8085;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;
    }
}
